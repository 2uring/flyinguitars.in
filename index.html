<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flyinguitars — by Faiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            color: #f5f5f5;
            overflow: hidden;
            position: relative;
        }

        .bg {
            position: fixed;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1718880474770-1952b4e5f37c?w=3840&q=90&auto=format&fit=crop');
            background-size: cover;
            background-position: center 40%;
            background-repeat: no-repeat;
            z-index: 0;
        }

        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to bottom,
                    rgba(0,0,0,0.3) 0%,
                    rgba(0,0,0,0.1) 30%,
                    rgba(0,0,0,0.1) 50%,
                    rgba(0,0,0,0.4) 80%,
                    rgba(0,0,0,0.7) 100%
                );
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-weight: 600;
            font-size: clamp(2.8rem, 9vw, 7rem);
            letter-spacing: 0.08em;
            line-height: 1.1;
            color: #fff;
            text-shadow:
                0 0 80px rgba(255,255,255,0.15),
                0 2px 10px rgba(0,0,0,0.8);
        }

        .byline {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-style: italic;
            font-size: clamp(1.1rem, 2.5vw, 1.6rem);
            color: rgba(255,255,255,0.65);
            margin-top: 1rem;
            letter-spacing: 0.25em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
        }

        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            margin: 1.2rem auto;
        }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(0.85rem, 1.5vw, 1rem);
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.35em;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scaleX(0); }
            to { opacity: 1; transform: scaleX(1); }
        }

        h1 {
            animation: fadeUp 1.5s ease-out 0.3s both;
        }

        .byline {
            animation: fadeUp 1.5s ease-out 0.7s both;
        }

        .divider {
            animation: scaleIn 1.2s ease-out 1.1s both;
        }

        .tagline {
            animation: fadeIn 2s ease-out 1.5s both;
        }

        .bg {
            animation: fadeIn 2s ease-out both;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="content">
        <h1>flyinguitars</h1>
        <div class="byline">by Faiz</div>
        <div class="divider"></div>
        <div class="tagline">music &middot; stories &middot; frames</div>
    </div>
</body>
</html>
