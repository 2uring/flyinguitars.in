<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup — Live Scores, Fixtures (IST) &amp; Line-ups — flyinguitars</title>
    <meta name="description" content="Every FIFA World Cup match in IST with live scores and starting line-ups — a flyinguitars tribute to South Africa 2010.">
    <meta name="theme-color" content="#080a07">
    <meta property="og:title" content="FIFA World Cup — Live Scores &amp; Fixtures in IST">
    <meta property="og:description" content="Every World Cup match in IST with live scores and line-ups.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="wc.css">
    <style>
        .back-link {
            position: fixed;
            top: 1.5rem; left: 2rem; z-index: 200;
            font-size: 0.8rem; font-weight: 400;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--text); text-decoration: none;
            display: flex; align-items: center; gap: 0.8rem;
            transition: color 0.3s, gap 0.35s var(--ease);
            mix-blend-mode: difference;
        }
        .back-link:hover { gap: 1.2rem; }
        .back-arrow {
            display: inline-block; width: 20px; height: 1px;
            background: currentColor; position: relative;
            transition: width 0.35s var(--ease);
        }
        .back-link:hover .back-arrow { width: 28px; }
        .back-arrow::before {
            content: ''; position: absolute; left: 0; top: -3px;
            width: 6px; height: 6px;
            border-bottom: 1px solid currentColor;
            border-left: 1px solid currentColor;
            transform: rotate(45deg);
        }
        /* this page IS the section, so give it top room for the back link */
        .wc.wc-page { padding-top: 6rem; min-height: 100vh; }
    </style>
</head>
<body>
    <div class="grain"></div>

    <a href="index.html" class="back-link">
        <span class="back-arrow"></span>
        flyinguitars
    </a>

    <section class="wc wc-page" id="worldcup">
        <div class="wc-inner">
            <div class="wc-ribbon"></div>
            <div class="wc-head">
                <div class="wc-kicker">Ke Nako · It's Time</div>
                <h1 class="wc-title">FIFA World Cup</h1>
                <p class="wc-sub">
                    Every match, every kickoff in <strong>IST</strong> — with live scores
                    and starting line-ups, the way you'd see them on Google.
                </p>
            </div>
            <div class="wc-meta">
                <span class="wc-dot" id="wcStatusDot"></span>
                <span id="wcUpdated">syncing…</span>
            </div>

            <div class="wc-tabs" id="wcTabs">
                <button class="wc-tab active" data-filter="all">All</button>
                <button class="wc-tab" data-filter="live">Live</button>
                <button class="wc-tab" data-filter="upcoming">Upcoming</button>
                <button class="wc-tab" data-filter="finished">Finished</button>
            </div>

            <div class="wc-grid" id="wcGrid">
                <div class="wc-loading">Loading World Cup fixtures…</div>
            </div>
        </div>
    </section>

    <div class="wc-modal" id="wcModal" aria-hidden="true">
        <div class="wc-modal-box">
            <button class="wc-modal-close" id="wcModalClose" aria-label="Close">&times;</button>
            <div id="wcModalContent"></div>
        </div>
    </div>

    <footer class="footer">
        <span>&copy; 2026 Faiz Haq</span>
        <span class="footer-logo">flyinguitars</span>
        <span>Hyderabad, IN</span>
    </footer>

    <button id="wcMusicBtn" class="wc-music-btn" type="button"
            aria-label="Play Wavin' Flag by K'naan" aria-pressed="false" title="Wavin' Flag — K'naan">
        <span class="wc-music-disc"><span class="wc-music-icon" id="wcMusicIcon">&#9654;</span></span>
        <span class="wc-music-label" id="wcMusicLabel">Play <strong>Wavin'&nbsp;Flag</strong></span>
    </button>
    <div id="wcYTWrap" aria-hidden="true" style="position:fixed; left:-9999px; top:0; width:240px; height:135px; pointer-events:none;">
        <div id="wcYT"></div>
    </div>

    <script src="wc.js"></script>
    <script>
    /* ——— Wavin' Flag (K'naan) background player via YouTube IFrame API ——— */
    (function () {
        var VIDEO_ID = 'WTJSt4wP2ME'; // K'NAAN — Wavin' Flag (Coca-Cola Celebration Mix)
        var WATCH_URL = 'https://www.youtube.com/watch?v=' + VIDEO_ID;
        var btn = document.getElementById('wcMusicBtn');
        var icon = document.getElementById('wcMusicIcon');
        var label = document.getElementById('wcMusicLabel');
        if (!btn) return;

        var player = null;
        var apiLoading = false;
        var ready = false;

        var PLAY = '\u25B6';   // ▶
        var PAUSE = '\u2759\u2759'; // ❙❙-ish (two bars)

        function setState(s) {
            btn.classList.remove('loading', 'playing');
            if (s === 'loading') {
                btn.classList.add('loading');
                icon.innerHTML = '&#8226;';
                label.innerHTML = 'Loading&hellip;';
                btn.setAttribute('aria-pressed', 'false');
            } else if (s === 'playing') {
                btn.classList.add('playing');
                icon.textContent = PAUSE;
                label.innerHTML = 'Now playing &middot; <strong>Wavin\u2019 Flag</strong>';
                btn.setAttribute('aria-pressed', 'true');
            } else { // paused / idle
                icon.textContent = PLAY;
                label.innerHTML = 'Play <strong>Wavin\u2019 Flag</strong>';
                btn.setAttribute('aria-pressed', 'false');
            }
        }

        function loadApi() {
            if (apiLoading) return;
            apiLoading = true;
            var prev = window.onYouTubeIframeAPIReady;
            window.onYouTubeIframeAPIReady = function () {
                if (typeof prev === 'function') { try { prev(); } catch (e) {} }
                createPlayer();
            };
            var tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            document.head.appendChild(tag);
        }

        function createPlayer() {
            player = new YT.Player('wcYT', {
                videoId: VIDEO_ID,
                width: '240', height: '135',
                playerVars: { autoplay: 1, playsinline: 1, rel: 0, modestbranding: 1, start: 12 },
                events: {
                    onReady: function (e) { ready = true; e.target.playVideo(); },
                    onStateChange: function (e) {
                        if (e.data === YT.PlayerState.PLAYING) setState('playing');
                        else if (e.data === YT.PlayerState.PAUSED) setState('paused');
                        else if (e.data === YT.PlayerState.ENDED) setState('paused');
                    },
                    onError: function () {
                        // embedding blocked or unavailable — fall back to opening YouTube
                        setState('paused');
                        label.innerHTML = 'Opens on <strong>YouTube</strong>';
                        btn.onclick = function () { window.open(WATCH_URL, '_blank', 'noopener'); };
                        window.open(WATCH_URL, '_blank', 'noopener');
                    }
                }
            });
        }

        btn.addEventListener('click', function () {
            if (!player) {
                if (!window.YT || !window.YT.Player) { setState('loading'); loadApi(); }
                else { setState('loading'); createPlayer(); }
                return;
            }
            if (!ready) return;
            var st = player.getPlayerState();
            if (st === YT.PlayerState.PLAYING) player.pauseVideo();
            else player.playVideo();
        });

        // Auto-start playback from 0:12 as soon as the page opens. Some browsers
        // block autoplay with sound until the user interacts — if that happens the
        // button stays available so the user can start/pause manually.
        setState('loading');
        loadApi();
    })();
    </script>
</body>
</html>
